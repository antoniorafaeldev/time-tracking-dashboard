<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/src/css/style.css">
    <title>Time Tracking Dashboard</title>
</head>
<body>
    <main>

        <section class="profile">
            <div class="profile__data">
                <img src="./assets/img/image-jeremy.png" alt="Image of Jeremy Robson" class="profile__image">
                <div class="profile__user">
                    <span class="profile__reportFor">Report for</span>
                    <h1 class="profile__name">Jeremy Robson</h1>
                </div>
            </div>

            <div class="profile__stats">
                <ul class="profile__statsList">
                    <li class="profile__switchStats" id="daily">Daily</li>
                    <li class="profile__switchStats active" id="weekly">Weekly</li>
                    <li class="profile__switchStats" id="monthly">Monthly</li>
                </ul>
            </div>

        </section>

        <section class="statsConteiner" id="statsConteinter">

            <!-- Os stats serão inseridos dinamicamente-->
            
        </section>
    </main>

    <script src="./assets/src/js/script.js"></script>
</body>
</html>
